/* ========================================
   내공 기숙캠프 랜딩 — 디자인 토큰

:root {

  --line: #E5E7EB;

* { box-sizing: border-box; }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* Typography */

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

.section { padding: clamp(56px, 9vw, 120px) 0; }

.section-head .eyebrow { margin-bottom: 12px; display: inline-block; }
.section-head .sub { color: var(--muted); margin-top: 12px; max-width: 640px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; height: 52px; padding: 0 28px;
  font-family: var(--f-kr); font-weight: 600; font-size: 15px;
  border-radius: 2px;
  transition: transform .2s ease, background .2s ease, border-color .2s ease, color .2s ease;

}
.btn-primary { background: var(--gold); color: var(--navy); }

/* Yellow placeholder — image stand-in */

    transparent 0 14px,
    rgba(0,0,0,0.04) 14px 15px

  display: flex; align-items: center; justify-content: center;
  color: #2A2000;
  font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  font-size: 11px; letter-spacing: 0.02em;
  text-align: center;
  padding: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  overflow: hidden;
}
.ph::before {
  content: "IMAGE";

  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em;
  color: rgba(0,0,0,0.55);
}

  max-width: 90%;
  line-height: 1.5;
}
.ph.ph-sm::before { font-size: 8px; top: 6px; left: 8px; }
.ph-ratio-16-9 { aspect-ratio: 16/9; }
.ph-ratio-4-3 { aspect-ratio: 4/3; }
.ph-ratio-3-2 { aspect-ratio: 3/2; }
.ph-ratio-1-1 { aspect-ratio: 1/1; }
.ph-ratio-3-4 { aspect-ratio: 3/4; }

.nav {

}

}

.nav-logo-mark {

}
.nav-menu { display: flex; gap: 28px; }
.nav-menu a {

  font-size: 14px; font-weight: 500;

  position: relative;
  padding: 6px 0;
}
.nav-menu a:hover { color: var(--white); }
.nav-menu a.active { color: var(--gold); }
.nav-menu a.active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
  height: 2px; background: var(--gold);
}
.nav-cta { display: flex; align-items: center; gap: 12px; }
.nav-cta .btn { height: 40px; padding: 0 18px; font-size: 14px; }

.nav-burger {
  display: none;
  width: 40px; height: 40px;
  align-items: center; justify-content: center;
  color: var(--white);
}
.nav-burger svg { width: 22px; height: 22px; }
.nav-mobile {
  position: fixed;
  top: var(--nav-h); left: 0; right: 0;
  background: var(--navy);
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 99;
  transform: translateY(-110%);
  transition: transform .3s ease;
  padding: 16px 24px 24px;
}
.nav-mobile.open { transform: translateY(0); }
.nav-mobile a {
  display: block; padding: 14px 0;
  color: rgba(255,255,255,0.85);
  font-size: 16px; font-weight: 500;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.nav-mobile .btn { margin-top: 16px; width: 100%; }

/* Mobile floating bar */
.mfab {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 90;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: rgba(11,42,91,0.96);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.mfab .btn { width: 100%; }
.mfab--hidden { opacity: 0; pointer-events: none; transform: translateY(100%); transition: opacity 0.3s, transform 0.3s; }
.mfab--visible { opacity: 1; pointer-events: auto; transform: translateY(0); transition: opacity 0.3s, transform 0.3s; }

/* Scroll reveal */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity .8s ease, transform .8s ease; }
.reveal.in { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: .08s; }
.reveal-delay-2 { transition-delay: .16s; }
.reveal-delay-3 { transition-delay: .24s; }
.reveal-delay-4 { transition-delay: .32s; }

/* Utility */
.gold-rule { height: 1px; background: var(--gold); opacity: 0.6; }
.gold-pipe { width: 3px; background: var(--gold); }
.coral { color: var(--coral); }
.gold-text { color: var(--gold); }
.navy-text { color: var(--navy); }
.grid { display: grid; gap: 24px; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }

/* Hero */
.hero { padding-top: var(--nav-h); }
.hero-photo {
  width: 100%;
  height: 68vh; min-height: 480px; max-height: 720px;
}

/* Hero Slider */
.hero-slider {
  position: relative;
  width: 100%;
  height: 68vh; min-height: 480px; max-height: 720px;
  overflow: hidden;
}
.hero-slide {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
  pointer-events: none;
}
.hero-slide.active {
  opacity: 1;
  pointer-events: auto;
}
.hero-slide img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

}

}

.hero-text {
  background: var(--navy);
  color: var(--white);
  padding: clamp(40px, 6vw, 72px) 0 clamp(40px, 6vw, 72px);
  border-top: 1px solid var(--gold);
}
.hero-text .eyebrow { color: var(--gold); margin-bottom: 20px; }
.hero-text .h1 { color: var(--white); max-width: 820px; margin-bottom: 20px; }

.hero-split {

  border-radius: 16px 16px 0 0;
}

}
.stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);

  max-width: 1200px;

  display: block;
}
@media (max-width: 767px) {
  .ceo-photo-full { max-height: none; }
  .ceo-photo-full img { width: 100%; object-position: center center; }
}
.ceo-text {
  padding: clamp(32px, 5vw, 72px);
  display: flex; flex-direction: column; justify-content: center;
  border-left: 1px solid var(--gold);
}
.ceo-quote {
  position: relative;
  font-size: clamp(18px, 2vw, 24px);
  font-weight: 500;
  line-height: 1.55;
  color: var(--white);
  margin: 0 0 28px;
  padding-left: 36px;
}
.ceo-quote::before {
  content: "“";
  position: absolute; left: 0; top: -16px;
  font-family: "Georgia", serif;
  font-size: 64px;
  color: var(--gold);
  line-height: 1;
}
.ceo-divider { width: 48px; height: 1px; background: var(--gold); margin-bottom: 24px; }
.ceo-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.ceo-role { color: var(--gold-soft); font-size: 14px; margin-bottom: 24px; }
.ceo-list { list-style: none; padding: 0; margin: 0 0 28px; }
.ceo-list li {
  color: #B8C2D1;
  font-size: 14px;
  padding: 6px 0 6px 16px;
  position: relative;
}
.ceo-list li::before {
  content: ""; position: absolute; left: 0; top: 14px;
  width: 6px; height: 1px; background: var(--gold);
}
.ceo-video {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-size: 14px; font-weight: 500;
  transition: background .2s ease, color .2s ease;
  align-self: flex-start;
}
.ceo-video:hover { background: var(--gold); color: var(--navy); }
.ceo-video .play {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  display: grid; place-items: center;
}

/* Target selection cards */
.target-card {
  background: var(--white);
  box-shadow: var(--shadow-md);
  border-radius: 16px;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform .3s ease, box-shadow .3s ease;
  cursor: pointer;
}
.target-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.target-card .ph { height: 260px; flex-shrink: 0; border-radius: 0; }
.target-body { padding: 28px 28px 24px; display: flex; flex-direction: column; gap: 0; }
.target-tag {
  display: inline-block; align-self: flex-start;
  background: var(--navy); color: var(--white);
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
  padding: 6px 14px; border-radius: 999px;
  margin-bottom: 14px;
}
.target-meta {
  font-size: 13px; color: var(--muted);
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.target-name { font-size: clamp(20px, 2vw, 26px); font-weight: 800; color: var(--navy); letter-spacing: -0.02em; margin-bottom: 12px; }
.target-hook { font-size: 15px; color: var(--ink-2); line-height: 1.7; margin-bottom: 24px; }
.target-more {
  display: block; text-align: center;
  background: #D9CBBB; color: var(--navy);
  font-weight: 700; font-size: 16px;
  padding: 16px; border-radius: 10px;
  margin-top: auto;
  transition: background .2s;
}
.target-card:hover .target-more { background: #C9B8A4; }

/* Comparison table */
.cmp {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
  box-shadow: var(--shadow-md);
}
.cmp th, .cmp td {
  padding: 18px 20px;
  text-align: left;
  font-size: 15px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.cmp thead th {
  background: var(--navy);
  color: var(--white);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
}
.cmp tbody tr:nth-child(even) { background: #FAFBFC; }
.cmp td:first-child, .cmp th:first-child {
  font-weight: 600; color: var(--muted); width: 180px;
  background: #F6F8FB;
}
.cmp .cmp-price-old { color: var(--muted); text-decoration: line-through; font-size: 13px; display: block; }
.cmp .cmp-price-new { color: var(--gold); font-weight: 700; font-size: 17px; }
.cmp .chk { color: var(--gold); font-weight: 700; margin-right: 6px; }

/* Camp Comparison Cards */
.camp-compare {
  display: grid;
  grid-template-columns: 5fr 7fr;
  gap: 0;
  overflow: visible;
  margin-top: 48px;
  align-items: stretch;
}
.camp-col {
  display: flex;
  flex-direction: column;
}
.camp-col-old {
  background: #F5F5F5;
  border-radius: 20px 0 0 20px;
  overflow: hidden;
}
.camp-col-new {
  background: var(--navy);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 48px rgba(0,0,0,0.22);
  position: relative;
  z-index: 1;
  margin-left: -4px;
}
.camp-col-head {
  padding: 28px 32px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
.camp-col-new .camp-col-head { border-bottom-color: rgba(255,255,255,0.1); }
.camp-col-tag {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 4px; margin-bottom: 10px;
}
.camp-col-old .camp-col-tag { background: #E5E5E5; color: #888; }
.camp-col-new .camp-col-tag { background: var(--gold); color: var(--navy); }
.camp-col-name {
  font-size: clamp(16px, 1.6vw, 20px); font-weight: 700;
}
.camp-col-old .camp-col-name { color: #444; }
.camp-col-new .camp-col-name { color: var(--white); }
.camp-img-area {
  width: 100%; aspect-ratio: 4/3;
  overflow: hidden;
}
.camp-img-area img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.camp-items { padding: 8px 0 28px; }
.camp-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 32px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.camp-col-new .camp-item { border-bottom-color: rgba(255,255,255,0.07); }
.camp-item:last-child { border-bottom: none; }
.camp-item-icon {
  flex-shrink: 0;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-top: 1px;
}
.camp-col-old .camp-item-icon { background: #E5E5E5; color: #999; }
.camp-col-new .camp-item-icon { background: rgba(196,162,94,0.2); color: var(--gold); }
.camp-item-body {}
.camp-item-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 3px;
}
.camp-col-old .camp-item-label { color: #999; }
.camp-col-new .camp-item-label { color: var(--gold); }
.camp-item-text {
  font-size: 14px; line-height: 1.55;
}
.camp-col-old .camp-item-text { color: #555; }
.camp-col-new .camp-item-text { color: rgba(255,255,255,0.85); }
@media (max-width: 640px) {
  .camp-compare { grid-template-columns: 5fr 7fr; }
  .camp-col-old { border-radius: 14px 0 0 14px; }
  .camp-col-new { border-radius: 14px; }
  .camp-col-head { padding: 14px 12px 10px; }
  .camp-col-tag { font-size: 8px; padding: 3px 7px; margin-bottom: 6px; }
  .camp-col-name { font-size: 12px; }
  .camp-img-area { aspect-ratio: 4/3; font-size: 10px; }
  .camp-item { padding: 9px 12px; gap: 8px; }
  .camp-item-icon { width: 16px; height: 16px; font-size: 9px; }
  .camp-item-label { font-size: 8px; margin-bottom: 2px; }
  .camp-item-text { font-size: 10px; line-height: 1.4; }
  .camp-items { padding: 4px 0 16px; }
}

/* Countdown CTA */
.cta-section { background: var(--navy); color: var(--white); text-align: center; }
.cta-head { margin-bottom: 16px; font-size: clamp(22px, 3vw, 36px); font-weight: 700; color: var(--white); }
.cta-sub { color: #B8C2D1; font-size: 15px; margin-bottom: 40px; }
.cta-countdown {
  display: flex; gap: 12px; justify-content: center; margin: 32px 0;
  flex-wrap: wrap;
}
.cd-box {
  min-width: 100px;
  padding: 20px 16px;
  background: var(--navy-deep);
  border: 1px solid var(--navy-line);
  display: flex; flex-direction: column; gap: 6px;
}
.cd-num {
  font-family: var(--f-num); font-weight: 700;
  font-size: clamp(32px, 5vw, 48px);
  color: var(--white);
  line-height: 1;
  letter-spacing: -0.02em;
}
.cd-lbl { color: var(--muted-2); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
.cta-price { margin: 28px 0 16px; font-size: 18px; }
.cta-price-old { color: var(--muted-2); text-decoration: line-through; margin-right: 12px; }
.cta-price-new { color: var(--gold); font-weight: 700; font-size: 24px; font-family: var(--f-num); }
.cta-price-save { color: var(--gold); margin-left: 10px; font-size: 15px; }
.cta-shield {
  display: inline-flex; gap: 8px; align-items: center;
  padding: 8px 14px; border: 1px solid var(--gold); color: var(--gold);
  font-size: 13px; font-weight: 600; margin-bottom: 32px;
}
.cta-actions { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

/* Footer */
.foot {
  background: var(--navy-deep);
  color: #9AA6BA;
  padding: 56px 0 40px;
  font-size: 13px;
}
.foot-grid { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 48px; align-items: flex-start; }
.foot-logo { display: flex; align-items: center; gap: 10px; color: var(--white); font-size: 18px; font-weight: 800; margin-bottom: 12px; }
.foot-info p { margin: 4px 0; line-height: 1.8; }
.foot-links { display: flex; flex-direction: column; gap: 10px; }
.foot-links a { color: #9AA6BA; }
.foot-links a:hover { color: var(--white); }
.foot-bottom {
  margin-top: 40px; padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  color: #6B7A94; font-size: 12px;
}

/* ====== go3 / pre-go1 shared ====== */
.page-g3 { background: var(--bg-g3); }
.page-g3 .section:nth-child(odd) { background: var(--white); }
.page-g3 .section.section-alt { background: var(--bg-g3); }

.page-p1 { background: var(--bg-p1); }
.page-p1 .section:nth-child(odd) { background: var(--white); }
.page-p1 .section.section-alt { background: var(--bg-p1); }

/* Pain points */
.pain-list { display: flex; flex-direction: column; gap: 16px; margin: 40px 0; }
.pain-item {
  display: flex; gap: 16px; align-items: flex-start;
  padding: 18px 20px;
  background: var(--white);
  border-left: 3px solid var(--coral);
  box-shadow: var(--shadow-sm);
}
.pain-x {
  flex-shrink: 0;
  width: 24px; height: 24px; color: var(--coral);
  font-weight: 800; font-size: 18px;
  display: grid; place-items: center;
  margin-top: 2px;
}
.pain-text { font-size: 16px; color: var(--ink-2); line-height: 1.6; }
.pain-pivot {
  margin-top: 32px;
  padding: 24px 28px;
  background: var(--navy);
  color: var(--white);
  border-left: 4px solid var(--gold);
  font-size: clamp(18px, 2vw, 22px); font-weight: 600;
}

/* Pillar detail card */
.pillar-card {
  background: var(--white);
  box-shadow: var(--shadow-md);
  margin-bottom: 32px;
  overflow: hidden;
}
.pillar-head {
  display: flex; align-items: center; gap: 16px;
  padding: 28px 32px 0;
}
.pillar-no {
  display: grid; place-items: center;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--gold); color: var(--white);
  font-family: var(--f-num); font-weight: 700; font-size: 18px;
}
.pillar-title { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }
.pillar-body {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0;
  margin-top: 20px;
}
.pillar-icon {
  min-height: 280px;
  background: linear-gradient(150deg, #EBF0F9 0%, #DDE5F4 100%);
  display: flex; align-items: center; justify-content: center;
}
.pillar-txt { padding: 32px; display: flex; flex-direction: column; gap: 14px; }
.pillar-txt p { margin: 0; color: var(--ink-2); font-size: 15px; line-height: 1.75; }
.pillar-txt .hi { color: var(--navy); font-weight: 600; }
@media (max-width: 767px) {
  .pillar-icon { min-height: 200px; }
}

/* Process steps */
.process-steps {
  display: flex;
  flex-direction: column;
  margin-top: 48px;
  position: relative;
}
.process-step {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0;
  align-items: center;
  padding: 36px 0;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.process-step:last-child { border-bottom: none; }
.process-step-icon {
  width: 100%; height: 210px;
  border-radius: 16px;
  background: linear-gradient(150deg, #EBF0F9 0%, #DDE5F4 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.process-step-content { padding-left: 48px; }
.process-step-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--gold);
  margin-bottom: 6px;
}
.process-step-title {
  font-size: 22px; font-weight: 700;
  color: var(--navy);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.process-desc {
  font-size: 15px; line-height: 1.75;
  color: var(--ink-2);
  margin: 0;
}
@media (max-width: 767px) {
  .process-step { grid-template-columns: 1fr; gap: 16px; padding: 28px 0; }
  .process-step-icon { height: 170px; border-radius: 14px; }
  .process-step-content { padding-left: 0; }
  .process-step-title { font-size: 18px; }
  .process-desc { font-size: 14px; }
}

/* Mentor portrait cards v2 */
.mentor-grid-v2 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mentor-card-v2 {
  background: var(--navy);
  border-radius: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: default;
}
.mentor-card-v2:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(11,42,91,0.22); }
.mentor-card-v2-img {
  width: 100%;
  aspect-ratio: 3/4;
  overflow: hidden;
  position: relative;
}
.mentor-card-v2-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.mentor-card-v2-img .ph {
  width: 100% !important;
  height: 100% !important;
  min-height: unset !important;
}
.mentor-card-v2-body {
  padding: 18px 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mentor-card-v2-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--gold);
  margin-bottom: 2px;
}
.mentor-card-v2-name {
  font-size: 20px; font-weight: 700;
  color: var(--white);
  letter-spacing: -0.01em;
}
.mentor-card-v2-school {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
}
.mentor-card-v2-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.mentor-card-v2-tag {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.7);
}
@media (max-width: 767px) {
  .mentor-grid-v2 { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .mentor-card-v2-name { font-size: 16px; }
  .mentor-card-v2-body { padding: 14px 14px 18px; }
}

/* Strategy icon cards */
.strategy-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 48px;
}
.strategy-card {
  background: var(--white);
  border-radius: 20px;
  padding: 0;
  box-shadow: 0 4px 24px rgba(11,42,91,0.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.strategy-icon {
  width: 100%;
  height: 190px;
  background: linear-gradient(150deg, #EBF0F9 0%, #DDE5F4 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.strategy-card-body {
  padding: 24px 28px 32px;
  display: flex; flex-direction: column; gap: 10px;
}
.strategy-no {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--gold);
}
.strategy-title {
  font-size: 20px; font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
  letter-spacing: -0.01em;
}
.strategy-desc {
  font-size: 15px; line-height: 1.75;
  color: var(--ink-2);
  margin: 0;
}
.strategy-desc .hi { color: var(--navy); font-weight: 600; }
@media (max-width: 767px) {
  .strategy-grid { grid-template-columns: 1fr; }
  .strategy-icon { height: 160px; }
}

/* Timeline weeks */
.week-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.week-card {
  background: var(--white);
  box-shadow: var(--shadow-md);
  display: flex; flex-direction: column;
  position: relative;
}
.week-card::after {
  content: "→";
  position: absolute;
  right: -18px; top: 50%;
  transform: translateY(-50%);
  font-size: 22px;
  color: var(--gold);
  font-weight: 700;
}
.week-card:last-child::after { display: none; }
.week-tag {
  padding: 18px 24px 12px;
  color: var(--gold);
  font-family: var(--f-en);
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.week-title {
  padding: 0 24px 16px;
  font-size: 20px; font-weight: 700; color: var(--navy);
  letter-spacing: -0.01em;
}
.week-icon {
  width: 100%; height: 200px;
  background: linear-gradient(150deg, #EBF0F9 0%, #DDE5F4 100%);
  display: flex; align-items: center; justify-content: center;
}
@media (max-width: 767px) { .week-icon { height: 160px; } }
.week-list {
  padding: 20px 24px 24px;
  list-style: none; margin: 0;
  display: flex; flex-direction: column; gap: 10px;
}
.week-list li {
  padding-left: 18px; position: relative;
  color: var(--ink-2); font-size: 14px; line-height: 1.55;
}
.week-list li::before {
  content: ""; position: absolute; left: 0; top: 9px;
  width: 8px; height: 1px; background: var(--gold);
}

/* Schedule accordion */
.sched { margin-top: 48px; }
.sched-item {
  border-bottom: 1px solid var(--line);
  background: var(--white);
}
.sched-item:first-child { border-top: 1px solid var(--line); }
.sched-head {
  width: 100%;
  padding: 22px 28px;
  display: flex; align-items: center; justify-content: space-between;
  background: transparent;
  font-family: var(--f-kr);
  font-size: 15px; font-weight: 600;
  color: var(--navy);
  text-align: left;
  transition: background .2s ease;
}
.sched-head:hover { background: #F6F8FB; }
.sched-head .time { color: var(--gold); font-family: var(--f-num); font-weight: 700; min-width: 120px; }
.sched-head .act { flex: 1; padding: 0 16px; }
.sched-head .chev { font-size: 18px; color: var(--muted); transition: transform .2s ease; }
.sched-item.open .chev { transform: rotate(180deg); }
.sched-body {
  max-height: 0; overflow: hidden;
  transition: max-height .3s ease;
}
.sched-item.open .sched-body { max-height: 400px; }
.sched-body-inner {
  padding: 0 28px 24px 28px;
  color: var(--ink-2); font-size: 14px; line-height: 1.75;
}

/* Outcome goals */
.outcomes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.outcome {
  background: var(--white);
  padding: 32px 28px;
  box-shadow: var(--shadow-md);
  position: relative;
  border-top: 3px solid var(--gold);
}
.outcome-num {
  font-family: var(--f-num); font-weight: 700;
  font-size: 48px;
  color: var(--navy);
  line-height: 1; margin-bottom: 4px; letter-spacing: -0.02em;
}
.outcome-unit { color: var(--gold); font-weight: 600; font-size: 16px; margin-bottom: 16px; }
.outcome-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.outcome-desc { font-size: 14px; color: var(--ink-2); line-height: 1.65; }

/* Mentor profile */
.mentor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.mentor-card {
  background: var(--white);
  box-shadow: var(--shadow-md);
  transition: transform .3s ease, box-shadow .3s ease;
}
.mentor-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.mentor-card .ph { aspect-ratio: 3/4; height: auto; }
.mentor-body { padding: 24px; }
.mentor-badge {
  display: inline-block;
  padding: 4px 10px;
  background: var(--navy); color: var(--white);
  font-family: var(--f-en); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}
.mentor-name { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.mentor-school { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
.mentor-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.mentor-tags span {
  padding: 3px 8px; font-size: 11px;
  background: #F2ECE2; color: var(--gold-dim);
  font-weight: 500;
}

/* Report mockup */
.report {
  background: var(--navy);
  color: var(--white);
  padding: clamp(32px, 5vw, 56px);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
}
.report-text h3 { color: var(--white); font-size: clamp(22px, 2.6vw, 30px); margin: 0 0 16px; font-weight: 700; letter-spacing: -0.01em; }
.report-text p { color: #B8C2D1; font-size: 15px; line-height: 1.7; margin: 0 0 20px; }
.report-text ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.report-text li { padding-left: 20px; position: relative; color: #E4E9F2; font-size: 14px; }
.report-text li::before {
  content: "✓"; position: absolute; left: 0; color: var(--gold); font-weight: 700;
}
.report-img-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
}
.report-img-wrap img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
@media (max-width: 767px) {
  .report-img-wrap { margin-top: 8px; }
}
.report-mock {
  aspect-ratio: 9/16;
  max-height: 480px;
  margin: 0 auto;
  background: var(--white);
  box-shadow: var(--shadow-lg);
  padding: 20px;
  color: var(--ink);
  display: flex; flex-direction: column; gap: 14px;
}
.report-mock .rm-head {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 10px; border-bottom: 1px solid var(--line);
}
.report-mock .rm-title { font-size: 13px; font-weight: 700; color: var(--navy); }
.report-mock .rm-date { font-size: 10px; color: var(--muted); font-family: var(--f-num); }
.report-mock .rm-ring {
  width: 120px; height: 120px; margin: 0 auto;
  border-radius: 50%;
  background: conic-gradient(var(--gold) 0deg 285deg, #EEF0F4 285deg 360deg);
  display: grid; place-items: center;
  position: relative;
}
.report-mock .rm-ring::before {
  content: ""; position: absolute;
  inset: 12px; background: var(--white); border-radius: 50%;
}
.report-mock .rm-ring-inner {
  position: relative; z-index: 2;
  text-align: center;
}
.report-mock .rm-ring-inner .n { font-family: var(--f-num); font-weight: 700; font-size: 22px; color: var(--navy); line-height: 1; }
.report-mock .rm-ring-inner .l { font-size: 10px; color: var(--muted); margin-top: 2px; }
.rm-bars { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.rm-bar { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.rm-bar .rm-lbl { width: 48px; color: var(--muted); font-weight: 600; }
.rm-bar .rm-trk { flex: 1; height: 6px; background: #EEF0F4; border-radius: 2px; overflow: hidden; }
.rm-bar .rm-fil { height: 100%; background: var(--navy); }
.rm-bar .rm-val { font-family: var(--f-num); font-weight: 700; font-size: 10px; color: var(--navy); width: 42px; text-align: right; }

/* Trust / guarantee */
.trust-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.trust-card {
  background: var(--white);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--line);
  border-radius: 20px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.trust-icon {
  width: 100%; height: 180px;
  background: linear-gradient(150deg, #EBF0F9 0%, #DDE5F4 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.trust-card-body {
  padding: 24px 28px 32px;
  display: flex; flex-direction: column; gap: 10px;
}
.trust-card h4 { margin: 0; font-size: 17px; font-weight: 700; color: var(--navy); }
.trust-card p { margin: 0; color: var(--ink-2); font-size: 14px; line-height: 1.65; }
@media (max-width: 767px) {
  .trust-grid { grid-template-columns: 1fr; }
  .trust-icon { height: 150px; }
}

/* Info session */
.info-session {
  background: var(--cream-2);
  padding: clamp(32px, 5vw, 56px);
  display: grid; grid-template-columns: 1fr 2fr; gap: 40px; align-items: center;
}
.info-session h3 { font-size: clamp(22px, 2.5vw, 28px); color: var(--navy); margin: 0 0 8px; font-weight: 700; }
.info-session p { margin: 0; color: var(--ink-2); line-height: 1.7; }
.info-dates { display: flex; flex-direction: column; gap: 10px; }
.info-date {
  background: var(--white); padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-left: 3px solid var(--gold);
}
.info-date .d-label { font-weight: 700; color: var(--navy); font-family: var(--f-num); font-size: 15px; }
.info-date .d-time { color: var(--muted); font-size: 13px; }
.info-date .d-book { color: var(--gold); font-size: 13px; font-weight: 600; }

/* FAQ */
.faq { max-width: 780px; margin: 0 auto; }
.faq-item {
  border-bottom: 1px solid var(--line);
}
.faq-q {
  width: 100%;
  padding: 24px 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  font-family: var(--f-kr);
  font-size: 16px; font-weight: 600;
  color: var(--navy);
  text-align: left;
  gap: 16px;
}
.faq-q .chev { color: var(--gold); font-size: 22px; transition: transform .2s ease; }
.faq-item.open .chev { transform: rotate(45deg); }
.faq-a {
  max-height: 0; overflow: hidden;
  transition: max-height .3s ease;
  color: var(--ink-2); font-size: 15px; line-height: 1.75;
}
.faq-item.open .faq-a { max-height: 400px; }
.faq-a-inner { padding: 0 0 24px; }

/* Responsive */
@media (max-width: 960px) {
  .grid-3 { grid-template-columns: 1fr; }
  .week-row { grid-template-columns: 1fr; }
  .week-card::after { content: "↓"; right: 50%; top: auto; bottom: -24px; transform: translateX(50%); }
  .mentor-grid { grid-template-columns: repeat(2, 1fr); }
  .outcomes { grid-template-columns: 1fr; }
  .trust-grid { grid-template-columns: 1fr; }
  .pillar-body { grid-template-columns: 1fr; }
  .report { grid-template-columns: 1fr; }
  .info-session { grid-template-columns: 1fr; }
  .nav-menu { display: none; }
  .nav-burger { display: flex; }
  .nav-cta .btn.desk-only { display: none; }
  .mfab { display: block; }
  body { padding-bottom: 76px; }
  .hero-photo { height: 46vh; min-height: 280px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }

  /* ── 모바일 첫 화면에 히어로 전체가 들어오도록 ── */
  .hero-slider { height: 38vh; min-height: 220px; max-height: 340px; }
  .hero-text { padding: 22px 0 20px; }
  .hero-text .eyebrow { margin-bottom: 10px; font-size: 11px; }
  .hero-text .h1 { font-size: clamp(24px, 6.5vw, 34px); margin-bottom: 10px; }
  .hero-text .sub { font-size: 13px; margin-bottom: 14px; }
  .hero-shield { padding: 6px 12px; font-size: 12px; margin-bottom: 16px; }
  .hero-ctas { gap: 8px; margin-bottom: 0; }
  .btn-lg { height: 52px; font-size: 15px; }
}
@media (max-width: 640px) {
  .grid-2 { grid-template-columns: 1fr; }
  .mentor-grid { grid-template-columns: 1fr; }
  .foot-grid { grid-template-columns: 1fr; gap: 32px; }
  .gal-1-2 .gal-row { grid-template-columns: 1fr; }
  .gal-2-1 { grid-template-columns: 1fr; }
  .facility-caption { padding-left: 0; }
  .cmp th, .cmp td { padding: 12px; font-size: 13px; }
  .cmp td:first-child, .cmp th:first-child { width: 100px; }
}

/* ====== Floating CTA ====== */
.fcta {
  position: fixed;
  right: 20px;
  bottom: 96px;
  z-index: 80;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.fcta-btn {
  width: 64px;
  height: 64px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: var(--navy-deep);
  border: 1px solid rgba(184,147,90,0.5);
  color: var(--gold);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: background .2s ease, color .2s ease, transform .2s ease, border-color .2s ease;
  text-decoration: none;
  font-family: var(--f-kr);
}
.fcta-btn:hover {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold);
  transform: translateX(-3px);
}
.fcta-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.fcta-top {
  background: var(--navy);
  border-color: rgba(184,147,90,0.3);
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity .3s ease, transform .3s ease, background .2s ease, color .2s ease;
}
.fcta-top.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
.fcta-top:hover { transform: translateX(-3px) translateY(0); }
.fcta-divider {
  height: 1px;
  background: rgba(184,147,90,0.25);
  margin: 2px 0;
}
@media (max-width: 960px) {
  .fcta { right: 12px; bottom: 82px; }
  .fcta-btn { width: 52px; height: 52px; font-size: 9px; gap: 3px; }
  .fcta-btn svg { width: 16px; height: 16px; }
}

/* ====== Consult Modal ====== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(6,27,62,0.72);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--white);
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  border-top: 4px solid var(--gold);
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform .3s ease;
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-head {
  background: var(--navy);
  color: var(--white);
  padding: 24px 28px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.modal-head h3 { margin: 0; font-size: 20px; font-weight: 700; }
.modal-head p { margin: 6px 0 0; color: #B8C2D1; font-size: 13px; }
.modal-close {
  background: none; border: none; color: rgba(255,255,255,0.6);
  font-size: 22px; cursor: pointer; padding: 0; line-height: 1;
  transition: color .2s;
}
.modal-close:hover { color: var(--white); }
.modal-body { padding: 28px; display: flex; flex-direction: column; gap: 18px; }
.form-row { display: flex; flex-direction: column; gap: 6px; }
.form-row label {
  font-size: 13px; font-weight: 600; color: var(--navy);
  letter-spacing: 0.02em;
}
.form-row label span { color: var(--coral); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--line-2);
  font-family: var(--f-kr); font-size: 15px; color: var(--ink);
  background: var(--white); border-radius: 2px;
  transition: border-color .2s ease;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--navy);
}
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-select { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%236B7280' d='M0 0h12L6 8z'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; }
.form-submit {
  width: 100%; height: 54px;
  background: var(--gold); color: var(--navy);
  font-family: var(--f-kr); font-size: 16px; font-weight: 700;
  border: none; cursor: pointer;
  transition: background .2s ease, transform .1s ease;
  margin-top: 4px;
}
.form-submit:hover { background: var(--gold-soft); }
.form-submit:active { transform: scale(0.99); }
.form-submit:disabled { background: var(--muted-2); cursor: not-allowed; }
.form-note {
  font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6;
}
.form-success {
  text-align: center; padding: 40px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.form-success .success-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: #F0FDF4; border: 2px solid #22C55E;
  display: grid; place-items: center; color: #22C55E; font-size: 26px;
}
.form-success h4 { margin: 0; font-size: 20px; font-weight: 700; color: var(--navy); }
.form-success p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.7; }

</style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-FLmn_KofP6JHxI3niPlSOxHvG5HRBk8tC1U0zMQPb1_KdCVO8SAR0c-p3CMIcwSucg/exec';

function ConsultModal({ open, onClose, defaultCamp }) {
  const [form, setForm] = React.useState({ name:'', phone:'', grade:'고3', camp: defaultCamp || '미정', message:'' });
  const [status, setStatus] = React.useState('idle'); // idle | loading | success | error

  React.useEffect(() => {
    if (open) {
      document.body.style.overflow = 'hidden';
      setForm(f => ({ ...f, camp: defaultCamp || '미정' }));
      setStatus('idle');
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [open, defaultCamp]);

  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.phone.trim()) return;
    setStatus('loading');
    const payload = {
      ...form,
      ...getUTM(),
      page: window.location.hash || '#/',
      submitted_at: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }),
    };
    try {
      const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain' });
      navigator.sendBeacon(APPS_SCRIPT_URL, blob);
      setStatus('success');
    } catch(err) {
      setStatus('error');
    }
  };

  const handleOverlay = (e) => { if (e.target === e.currentTarget) onClose(); };

// ============ Countdown ============
function useCountdown(target) {
  const [t, setT] = useState(() => computeT(target));
  useEffect(() => {
    const id = setInterval(() => setT(computeT(target)), 1000);
    return () => clearInterval(id);
  }, [target]);
  return t;
}
function computeT(target) {
  const diff = Math.max(0, new Date(target).getTime() - Date.now());
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return { d, h, m, s };
}
function Countdown({ target }) {
  const { d, h, m, s } = useCountdown(target);
  const p = (n) => String(n).padStart(2, "0");
  return (
    <div className="cta-countdown">
      <div className="cd-box"><div className="cd-num">{p(d)}</div><div className="cd-lbl">DAYS</div></div>
      <div className="cd-box"><div className="cd-num">{p(h)}</div><div className="cd-lbl">HOURS</div></div>
      <div className="cd-box"><div className="cd-num">{p(m)}</div><div className="cd-lbl">MINUTES</div></div>
      <div className="cd-box"><div className="cd-num">{p(s)}</div><div className="cd-lbl">SECONDS</div></div>
    </div>
  );
}

// ============ Reveal Observer ============
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

  const [showTop, setShowTop] = React.useState(false);

    const onScroll = () => setShowTop(window.scrollY > 400);
    window.addEventListener('scroll', onScroll, { passive: true });

    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const scrollTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  const goPage = (hash) => (e) => {
    e.preventDefault();
    window.location.hash = hash;

// ============ Event Modal (현장 설명회 신청) ============
function EventModal({ open, onClose }) {
  const [form, setForm] = React.useState({ name:'', phone:'', grade:'고3', attend:'학생 단독' });
  const [status, setStatus] = React.useState('idle');

  React.useEffect(() => {
    if (open) { document.body.style.overflow = 'hidden'; setStatus('idle'); }
    else document.body.style.overflow = '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.phone.trim()) return;
    setStatus('loading');
    const payload = {
      ...form,
      sheetTarget: '시트2',
      type: '현장설명회',
      event_date: '2026.06.13(토)',
      ...getUTM(),
      page: window.location.hash || '#/',
      submitted_at: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }),
    };
    try {
      const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain' });
      navigator.sendBeacon(APPS_SCRIPT_URL, blob);
      setStatus('success');
    } catch(err) { setStatus('error'); }
  };

  const handleOverlay = (e) => { if (e.target === e.currentTarget) onClose(); };

  return (
    <div className={`modal-overlay ${open ? 'open' : ''}`} onClick={handleOverlay}>
      <div className="modal-box">
        <div className="modal-head">
          <div>
            <h3>현장 설명회 신청</h3>
            <p>📅 2026.06.13(토) · 연세대 송도 국제캠퍼스</p>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="닫기">✕</button>
        </div>
        {status === 'success' ? (
          <div className="form-success">
            <div className="success-icon">✓</div>
            <h4>신청이 완료됐습니다!</h4>
            <p>입력하신 연락처로<br/>일정 안내 문자를 발송해 드립니다.</p>
            <button className="btn btn-primary" style={{marginTop:8}} onClick={onClose}>확인</button>
          </div>
        ) : (
          <form className="modal-body" onSubmit={handleSubmit}>
            <div className="form-row">
              <label>신청자 이름 <span>*</span></label>
              <input className="form-input" type="text" placeholder="홍길동" value={form.name} onChange={set('name')} required />
            </div>
            <div className="form-row">
              <label>연락처 <span>*</span></label>
              <input className="form-input" type="tel" placeholder="010-0000-0000" value={form.phone} onChange={set('phone')} required />
            </div>
            <div className="form-row">
              <label>학년 <span>*</span></label>
              <select className="form-select" value={form.grade} onChange={set('grade')}>
                <option value="고3">고3 (2027 수능)</option>
                <option value="중3">중3 (현 중3)</option>
                <option value="기타">기타</option>
              </select>
            </div>
            <div className="form-row">
              <label>참석 형태</label>
              <select className="form-select" value={form.attend} onChange={set('attend')}>
                <option value="학생 단독">학생 단독</option>
                <option value="보호자 동반">보호자 동반</option>
              </select>
            </div>
            <p style={{fontSize:12, color:'var(--muted)', margin:'4px 0 8px', lineHeight:1.6}}>
              수집된 정보는 설명회 안내 목적으로만 사용됩니다.
            </p>
            <button className="btn btn-primary" type="submit" style={{width:'100%', marginTop:4}} disabled={status==='loading'}>
              {status === 'loading' ? '신청 중...' : '설명회 신청하기'}
            </button>
            {status === 'error' && <p style={{color:'#e53e3e', fontSize:13, marginTop:8, textAlign:'center'}}>오류가 발생했습니다. 잠시 후 다시 시도해주세요.</p>}
          </form>
        )}
      </div>
    </div>
  );
}

function useHashRoute() {
  const [hash, setHash] = useState(() => window.location.hash || "#/");
  useEffect(() => {
    const onChange = () => {
      setHash(window.location.hash || "#/");
      window.scrollTo({ top: 0, behavior: "instant" });
    };
    window.addEventListener("hashchange", onChange);
    return () => window.removeEventListener("hashchange", onChange);
  }, []);
  return hash;
}

function App() {
  const hash = useHashRoute();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [modalOpen, setModalOpen] = useState(false);
  const [eventModalOpen, setEventModalOpen] = useState(false);
  const defaultCamp = hash.startsWith("#/go3") ? "고3 수능 실전 하드트레이닝" : hash.startsWith("#/pre-go1") ? "중3 습관 혁명" : "미정";
  useEffect(() => { window.__openConsultModal = () => setModalOpen(true); }, []);
  useEffect(() => { window.__openEventModal = () => setEventModalOpen(true); }, []);

  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty("--navy", tweaks.navy);
    r.setProperty("--gold", tweaks.gold);
    r.setProperty("--yellow-ph", tweaks.yellow);
    const creamMap = {
      cream: "#FAF7F2",
      pure:  "#FFFFFF",
      cool:  "#F4F6FA",
      warm:  "#FBF4E8",
    };
    r.setProperty("--cream", creamMap[tweaks.bgTone] || "#FAF7F2");
    document.body.style.background = creamMap[tweaks.bgTone] || "#FAF7F2";
    if (!tweaks.showMFab) {
      r.setProperty("--mfab-display", "none");
    }
  }, [tweaks]);

  let Page;
  if (hash.startsWith("#/go3")) Page = Go3Page;
  else if (hash.startsWith("#/pre-go1")) Page = PreGo1Page;
  else if (hash.startsWith("#/terms")) Page = TermsPage;
  else if (hash.startsWith("#/privacy")) Page = PrivacyPage;
  else Page = HubPage;

  return (
    <>
      <Page key={hash} />
      <FloatingCTA />
      <ConsultModal open={modalOpen} onClose={() => setModalOpen(false)} defaultCamp={defaultCamp} />
      <EventModal open={eventModalOpen} onClose={() => setEventModalOpen(false)} />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Colors">
          <TweakColor label="Navy (primary)"
            value={tweaks.navy}
            onChange={(v) => setTweak("navy", v)} />
          <TweakColor label="Gold (accent)"
            value={tweaks.gold}
            onChange={(v) => setTweak("gold", v)} />
          <TweakColor label="Image placeholder yellow"
            value={tweaks.yellow}
            onChange={(v) => setTweak("yellow", v)} />
        </TweakSection>
        <TweakSection label="Background tone">
          <TweakRadio
            label="Tone"
            value={tweaks.bgTone}
            onChange={(v) => setTweak("bgTone", v)}
            options={["cream", "pure", "cool", "warm"]} />
        </TweakSection>
        <TweakSection label="Mobile">
          <TweakToggle label="Floating consult bar"
            value={tweaks.showMFab}
            onChange={(v) => setTweak("showMFab", v)} />
        </TweakSection>
        <TweakSection label="Navigation">
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {[["#/", "메인 허브"], ["#/go3", "고3 캠프"], ["#/pre-go1", "중3 캠프"]].map(([h, l]) => (
              <button key={h} className="btn btn-light"
                onClick={() => { window.location.hash = h; }}
                style={{ height: 36, justifyContent: "flex-start", padding: "0 12px", fontSize: 13 }}>
                {l} →
              </button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
